server {
    server_name gandhara-arts-and-taxila-stone-crafts.com www.gandhara-arts-and-taxila-stone-crafts.com gandharataxila.com www.gandharataxila.com;
    
    # Global upload limits
    client_max_body_size 100M;
    client_body_timeout 300s;
    client_header_timeout 300s;

    root /var/www/Gandhara/frontend/dist;
    index index.html;

    # SEO endpoints - MUST come before other location blocks
    location = /robots.txt {
        proxy_pass http://localhost:5000/robots.txt;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /image-sitemap.xml {
        proxy_pass http://localhost:5000/image-sitemap.xml;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /sitemap.xml {
        proxy_pass http://localhost:5000/sitemap.xml;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WordPress to React redirects
    location ~* ^/product-category/(.+?)/?$ {
        set $category_name $1;
        return 301 https://gandharataxila.com/category/$category_name;
    }

    location ~* ^/product-tag/(.+?)/?$ {
        return 301 https://gandharataxila.com/category/gandhara-art;
    }

    # API proxy
    location /api/ {
        client_max_body_size 100M;
        client_body_timeout 300s;

        proxy_pass http://localhost:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;

        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # Product images with optimized caching
    location /uploads/ {
        alias /var/www/Gandhara/backend/uploads/;

        # Security headers
        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options DENY;
        add_header X-XSS-Protection "1; mode=block";

        # SEO headers for images
        add_header X-Robots-Tag "index, follow, imageindex";
        add_header Access-Control-Allow-Origin "*";
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
        add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept";

        # Aggressive caching for images (1 year)
        expires 365d;
        add_header Cache-Control "public, immutable";

        # Handle preflight requests
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin "*";
            add_header Access-Control-Allow-Methods "GET, OPTIONS";
            add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept";
            return 204;
        }

        try_files $uri =404;
    }

    # JavaScript files - with Gzip
    location ~* \.(js|mjs)$ {
        add_header Content-Type application/javascript;
        expires 365d;
        add_header Cache-Control "public, immutable";
        gzip_static on;
    }

    # CSS files - with Gzip
    location ~* \.css$ {
        add_header Content-Type text/css;
        expires 365d;
        add_header Cache-Control "public, immutable";
        gzip_static on;
    }

    # Fonts
    location ~* \.(eot|ttf|woff|woff2|otf)$ {
        add_header Access-Control-Allow-Origin "*";
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # Images - with caching
    location ~* \.(jpg|jpeg|png|gif|webp|avif|svg|ico)$ {
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # Videos - with caching
    location ~* \.(mp4|webm|ogg)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # Main location block for React app
    location / {
        try_files $uri $uri/ /index.html;
        
        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        
        # Cache index.html for 1 hour (must-revalidate ensures fresh content)
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # SSL configuration
    listen 443 ssl http2;
    ssl_certificate /etc/letsencrypt/live/gandhara-arts-and-taxila-stone-crafts.com-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gandhara-arts-and-taxila-stone-crafts.com-0001/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

# HTTP redirect block
server {
    listen 80;
    server_name gandhara-arts-and-taxila-stone-crafts.com www.gandhara-arts-and-taxila-stone-crafts.com gandharataxila.com www.gandharataxila.com;
    return 301 https://$server_name$request_uri;
}
